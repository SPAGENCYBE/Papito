input,textarea,select{width:100%;padding:14px 15px;border-radius:14px;border:1px solid #d2c3b2;background:#fffdf8;color:var(--ink);font:inherit}textarea{min-height:150px;resize:vertical}
button.submit{margin-top:18px;background:var(--ink);color:white;border:0;border-radius:999px;padding:14px 22px;font-weight:700;cursor:pointer}.info{color:var(--muted);line-height:1.6}
.wall{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.card{background:#fffdf8;border-radius:20px;padding:20px;border-left:5px solid var(--soft)}.card .meta{color:var(--muted);font-size:14px;margin:6px 0 12px}.card img{width:100%;max-height:280px;object-fit:cover;border-radius:14px;margin-top:12px}
.adminActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.adminActions button{border:0;border-radius:999px;padding:9px 13px;cursor:pointer;background:#343137;color:white;font-weight:700}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;padding:24px}.lightbox.open{display:flex}.lightbox img{max-width:92vw;max-height:86vh;box-shadow:0 20px 60px rgba(0,0,0,.5)}.lbClose,.lbPrev,.lbNext{position:fixed;border:0;background:rgba(255,255,255,.9);color:#111;border-radius:999px;cursor:pointer;font-weight:900}.lbClose{right:22px;top:22px;font-size:24px;width:46px;height:46px}.lbPrev,.lbNext{top:50%;transform:translateY(-50%);font-size:30px;width:52px;height:52px}.lbPrev{left:22px}.lbNext{right:22px}

@media(max-width:850px){.hero{grid-template-columns:1fr}.heroPhoto{min-height:52vh}.frame{min-height:auto}.gallery,.photoGrid{grid-template-columns:1fr 1fr}.gallery img,.gallery img.big{grid-column:auto;height:190px}.photoGrid img{height:190px}.formWrap,.wall{grid-template-columns:1fr}.lang{top:auto;bottom:16px;right:16px}.liveFixed{left:14px;right:14px;text-align:center;bottom:72px}.topnav{position:absolute}.lbPrev,.lbNext{width:44px;height:44px}}

<script type="module">
const ADMIN_EMAIL_DEFAULT = "carlos.van.nieuwenborgh@gmail.com";
const firebaseConfig = {
  apiKey: "AIzaSyBjQAxQigTNyPQo-mJY5Ca12LZQPLFf-J4",
  authDomain: "papito-9aa54.firebaseapp.com",
  projectId: "papito-9aa54",
  storageBucket: "papito-9aa54.firebasestorage.app",
  messagingSenderId: "458660647189",
  appId: "1:458660647189:web:8c9024f0098a1e198fd91c"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc,
  serverTimestamp, query, orderBy, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let currentLang = localStorage.getItem("site_lang") || "nl";
let galleryImages = [];
let galleryIndex = 0;

function $(id) { return document.getElementById(id); }

window.setLang = function(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  const nl = $("nl");
  const es = $("es");
  if (nl) nl.classList.toggle("active", lang === "nl");
  if (es) es.classList.toggle("active", lang === "es");
  document.querySelectorAll("[data-nl]").forEach(el => {
    el.textContent = el.dataset[lang] || el.dataset.nl || "";
  });
  localStorage.setItem("site_lang", lang);
};

function esc(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
  }[m]));
}

function isAdmin() {
  return !!auth.currentUser;
}

window.enterAdmin = async function() {
  const email = prompt(currentLang === "nl" ? "Admin e-mail:" : "Correo admin:", ADMIN_EMAIL_DEFAULT);
  if (!email) return;
  const password = prompt(currentLang === "nl" ? "Admin wachtwoord:" : "Contraseña admin:");
  if (!password) return;

  try {
    await signInWithEmailAndPassword(auth, email.trim(), password);
    const panel = $("adminPanel");
    if (panel) panel.style.display = "block";
    await loadMemories();
  } catch (error) {
    console.error(error);
    alert(currentLang === "nl"
      ? "Admin login mislukt. Controleer e-mail/wachtwoord en of Authentication aan staat."
      : "Error de inicio de sesión admin. Revisa correo/contraseña y Authentication.");
  }
};

window.exitAdmin = async function() {
  await signOut(auth);
  const panel = $("adminPanel");
  if (panel) panel.style.display = "none";
  await loadMemories();
};

async function uploadPhoto(file) {
  if (!file) return { url: "", path: "" };
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
  const storagePath = `memories/${Date.now()}-${safeName}`;
  const fileRef = ref(storage, storagePath);
  await uploadBytes(fileRef, file);
  const url = await getDownloadURL(fileRef);
  return { url, path: storagePath };
}

async function sendEmailNotification(data) {
  try {
    await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: "service_x1wh7b8",
        template_id: "template_a1becoi",
        user_id: "GZ26ksQVkIaUV3FMg",
        template_params: {
          from_name: data.name || "",
          relation: data.relation || "",
          message: data.text || "",
          language: data.language || "",
          date: data.date || "",
          photo_url: data.photo || "Geen foto toegevoegd"
        }
      })
    });
  } catch (error) {
    console.warn("EmailJS melding niet verstuurd:", error);
  }
}

async function loadMemories() {
  const wall = $("wall");
  if (!wall) return;

  wall.innerHTML = `<div class="card"><strong>${currentLang === "nl" ? "Laden..." : "Cargando..."}</strong></div>`;

  let q;
  if (isAdmin()) {
    q = query(collection(db, "memories"), orderBy("createdAt", "desc"));
  } else {
    q = query(collection(db, "memories"), where("approved", "==", true), orderBy("createdAt", "desc"));
  }

  let items = [];
  try {
    const snap = await getDocs(q);
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (error) {
    console.error(error);
    wall.innerHTML = `<div class="card"><strong>Firebase fout</strong><p>${esc(error.message)}</p></div>`;
    return;
  }

  const starters = [
    {
      name: "Familie",
      relation: "Voor Papi",
      language: "Nederlands",
      text: "Deze plek is gemaakt zodat iedereen een mooie herinnering aan Papi kan achterlaten.",
      date: new Date().toLocaleDateString("nl-BE"),
      approved: true
    },
    {
      name: "Familia",
      relation: "Para Papi",
      language: "Español",
      text: "Este lugar fue creado para que todos puedan dejar un hermoso recuerdo para Papi.",
      date: new Date().toLocaleDateString("es-ES"),
      approved: true
    }
  ];

  wall.innerHTML = "";
  [...items, ...starters].forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "card" + (!m.approved && m.id ? " pending" : "");
    const pending = (!m.approved && m.id)
      ? (currentLang === "nl" ? " · Wacht op goedkeuring" : " · Pendiente de aprobación")
      : "";

    div.innerHTML = `
      <strong>${esc(m.name)}</strong>
      <div class="meta">${esc(m.relation)} · ${esc(m.language)} · ${esc(m.date)}${pending}</div>
      <p>${esc(m.text).replace(/\n/g, "<br>")}</p>
      ${m.photo ? `<img src="${m.photo}" alt="">` : ""}
      ${isAdmin() && m.id ? `
        <div class="adminActions">
          ${!m.approved ? `<button class="approve" onclick="approveMemory('${m.id}')">Goedkeuren</button>` : ""}
          ${m.photo ? `<button onclick="downloadPhoto('${m.photo}', ${i})">Foto downloaden</button>` : ""}
          <button class="reject" onclick="deleteMemory('${m.id}', '${m.storagePath || ""}')">Verwijderen</button>
        </div>
      ` : ""}
    `;
    wall.appendChild(div);
  });
}

window.approveMemory = async function(id) {
  if (!isAdmin()) return alert("Admin login nodig.");
  await updateDoc(doc(db, "memories", id), { approved: true });
  await loadMemories();
};

window.deleteMemory = async function(id, storagePath) {
  if (!isAdmin()) return alert("Admin login nodig.");
  if (!confirm(currentLang === "nl" ? "Deze herinnering verwijderen?" : "¿Eliminar este recuerdo?")) return;

  await deleteDoc(doc(db, "memories", id));

  if (storagePath) {
    try {
      await deleteObject(ref(storage, storagePath));
    } catch (error) {
      console.warn("Foto kon niet verwijderd worden:", error);
    }
  }

  await loadMemories();
};

window.downloadPhoto = function(url, i) {
  if (!isAdmin()) return alert("Admin login nodig.");
  const a = document.createElement("a");
  a.href = url;
  a.download = `foto-herinnering-papi-${i + 1}.jpg`;
  a.target = "_blank";
  a.click();
};

window.downloadAllData = async function() {
  if (!isAdmin()) return alert("Admin login nodig.");
  const snap = await getDocs(query(collection(db, "memories"), orderBy("createdAt", "desc")));
  const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "papito-herinneringen-backup.json";
  a.click();
  URL.revokeObjectURL(a.href);
};

const form = $("form");
if (form) {
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const f = e.target;
    const btn = f.querySelector("button[type='submit'], .submit");
    const oldText = btn ? btn.textContent : "";
    if (btn) {
      btn.disabled = true;
      btn.textContent = currentLang === "nl" ? "Bezig met verzenden..." : "Enviando...";
    }

    try {
      const photoObj = await uploadPhoto(f.photo?.files?.[0]);
      const memoryData = {
        name: f.name.value.trim(),
        relation: f.relation.value.trim(),
        language: f.language.value,
        text: f.text.value.trim(),
        photo: photoObj.url,
        storagePath: photoObj.path,
        approved: false,
        date: new Date().toLocaleDateString(currentLang === "nl" ? "nl-BE" : "es-ES"),
        createdAt: serverTimestamp()
      };
      await addDoc(collection(db, "memories"), memoryData);
      await sendEmailNotification(memoryData);
      f.reset();
      alert(currentLang === "nl"
        ? "Bedankt. Je herinnering verschijnt na goedkeuring."
        : "Gracias. Tu recuerdo aparecerá después de la aprobación.");
      await loadMemories();
    } catch (err) {
      console.error(err);
      alert(currentLang === "nl"
        ? "Er ging iets mis. Probeer opnieuw."
        : "Algo salió mal. Inténtalo de nuevo.");
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    }
  });
}

window.closeLb = function() {
  const lb = $("lightbox");
  if (lb) lb.classList.remove("open");
};

window.nextLb = function() {
  if (!galleryImages.length) return;
  galleryIndex = (galleryIndex + 1) % galleryImages.length;
  $("lbImg").src = galleryImages[galleryIndex];
};

window.prevLb = function() {
  if (!galleryImages.length) return;
  galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
  $("lbImg").src = galleryImages[galleryIndex];
};

function setupLightbox() {
  galleryImages = [...document.querySelectorAll("[data-lightbox]")].map(img => img.src);
  document.querySelectorAll("[data-lightbox]").forEach((img, i) => {
    img.addEventListener("click", () => {
      galleryIndex = i;
      $("lbImg").src = galleryImages[galleryIndex];
      $("lightbox").classList.add("open");
    });
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeLb();
  if (e.key === "ArrowRight") nextLb();
  if (e.key === "ArrowLeft") prevLb();
  if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "p") enterAdmin();
});

onAuthStateChanged(auth, async () => {
  const panel = $("adminPanel");
  if (panel) panel.style.display = isAdmin() ? "block" : "none";
  await loadMemories();
});

setLang(currentLang);
setupLightbox();

if (new URLSearchParams(location.search).get("admin") === "1") {
  setTimeout(enterAdmin, 300);
}
</script>
