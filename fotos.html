<script type="module">
const ADMIN_EMAIL_DEFAULT = "carlos.van.nieuwenborgh@gmail.com";
const firebaseConfig = {
  apiKey: "AIzaSyBjQAxQigTNyPQo-mJY5Ca12LZQPLFf-J4",
  authDomain: "papito-9aa54.firebaseapp.com",
  projectId: "papito-9aa54",
  storageBucket: "papito-9aa54.firebasestorage.app",
  messagingSenderId: "458660647189",
  appId: "1:458660647189:web:8c9024f0098a1e198fd91c"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL,
  deleteObject
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let currentLang = localStorage.getItem("site_lang") || "nl";
let galleryImages = [];
let galleryIndex = 0;

function $(id) { return document.getElementById(id); }

function esc(value) {
  return String(value || "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#039;"
  }[char]));
}

function isAdmin() {
  return !!auth.currentUser;
}

function sortByCreatedAtDesc(items) {
  return items.sort((a, b) => {
    const av = a.createdAt && typeof a.createdAt.seconds === "number" ? a.createdAt.seconds : 0;
    const bv = b.createdAt && typeof b.createdAt.seconds === "number" ? b.createdAt.seconds : 0;
    return bv - av;
  });
}

window.setLang = function(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  const nl = $("nl");
  const es = $("es");
  if (nl) nl.classList.toggle("active", lang === "nl");
  if (es) es.classList.toggle("active", lang === "es");

  document.querySelectorAll("[data-nl]").forEach((el) => {
    el.textContent = el.dataset[lang] || el.dataset.nl || "";
  });

  localStorage.setItem("site_lang", lang);
};

window.enterAdmin = async function() {
  const email = prompt(currentLang === "nl" ? "Admin e-mail:" : "Correo admin:", ADMIN_EMAIL_DEFAULT);
  if (!email) return;

  const password = prompt(currentLang === "nl" ? "Admin wachtwoord:" : "Contraseña admin:");
  if (!password) return;

  try {
    await signInWithEmailAndPassword(auth, email.trim(), password);
    const panel = $("adminPanel");
    if (panel) panel.style.display = "block";
    await loadMemories();
  } catch (error) {
    console.error("Admin login error:", error);
    alert((currentLang === "nl" ? "Admin login mislukt: " : "Error de inicio de sesión admin: ") + (error.code || error.message));
  }
};

window.exitAdmin = async function() {
  await signOut(auth);
  const panel = $("adminPanel");
  if (panel) panel.style.display = "none";
  await loadMemories();
};

async function uploadPhoto(file) {
  if (!file) return { url: "", path: "" };

  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
  const storagePath = `memories/${Date.now()}-${safeName}`;
  const fileRef = ref(storage, storagePath);

  await uploadBytes(fileRef, file);
  const url = await getDownloadURL(fileRef);

  return { url, path: storagePath };
}

async function sendEmailNotification(data) {
  try {
    await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: "service_x1wh7b8",
        template_id: "template_a1becoi",
        user_id: "GZ26ksQVkIaUV3FMg",
        template_params: {
          from_name: data.name || "",
          relation: data.relation || "",
          message: data.text || "",
          language: data.language || "",
          date: data.date || "",
          photo_url: data.photo || "Geen foto toegevoegd"
        }
      })
    });
  } catch (error) {
    console.warn("EmailJS melding niet verstuurd:", error);
  }
}

async function getMemoryItems() {
  let q;

  if (isAdmin()) {
    q = query(collection(db, "memories"));
  } else {
    q = query(collection(db, "memories"), where("approved", "==", true));
  }

  const snap = await getDocs(q);
  return sortByCreatedAtDesc(snap.docs.map((documentSnapshot) => ({
    id: documentSnapshot.id,
    ...documentSnapshot.data()
  })));
}

window.loadMemories = async function() {
  const wall = $("wall");
  if (!wall) return;

  wall.innerHTML = `<div class="card"><strong>${currentLang === "nl" ? "Laden..." : "Cargando..."}</strong></div>`;

  let items = [];

  try {
    items = await getMemoryItems();
  } catch (error) {
    console.error("Firebase read error:", error);
    wall.innerHTML = `<div class="card"><strong>Firebase fout</strong><p>${esc(error.code || error.message)}</p></div>`;
    return;
  }

  const starters = [
    {
      name: "Familie",
      relation: "Voor Papi",
      language: "Nederlands",
      text: "Deze plek is gemaakt zodat iedereen een mooie herinnering aan Papi kan achterlaten.",
      date: new Date().toLocaleDateString("nl-BE"),
      approved: true
    },
    {
      name: "Familia",
      relation: "Para Papi",
      language: "Español",
      text: "Este lugar fue creado para que todos puedan dejar un hermoso recuerdo para Papi.",
      date: new Date().toLocaleDateString("es-ES"),
      approved: true
    }
  ];

  wall.innerHTML = "";

  [...items, ...starters].forEach((memory, index) => {
    const card = document.createElement("div");
    card.className = "card" + (!memory.approved && memory.id ? " pending" : "");

    const pendingText = (!memory.approved && memory.id)
      ? (currentLang === "nl" ? " · Wacht op goedkeuring" : " · Pendiente de aprobación")
      : "";

    card.innerHTML = `
      <strong>${esc(memory.name)}</strong>
      <div class="meta">${esc(memory.relation)} · ${esc(memory.language)} · ${esc(memory.date)}${pendingText}</div>
      <p>${esc(memory.text).replace(/
/g, "<br>")}</p>
      ${memory.photo ? `<img src="${memory.photo}" alt="">` : ""}
      ${isAdmin() && memory.id ? `
        <div class="adminActions">
          ${!memory.approved ? `<button class="approve" onclick="approveMemory('${memory.id}')">Goedkeuren</button>` : ""}
          ${memory.photo ? `<button onclick="downloadPhoto('${memory.photo}', ${index})">Foto downloaden</button>` : ""}
          <button class="reject" onclick="deleteMemory('${memory.id}', '${memory.storagePath || ""}')">Verwijderen</button>
        </div>
      ` : ""}
    `;

    wall.appendChild(card);
  });
};

window.approveMemory = async function(id) {
  if (!isAdmin()) return alert("Admin login nodig.");

  try {
    await updateDoc(doc(db, "memories", id), { approved: true });
    await loadMemories();
  } catch (error) {
    console.error("Approve error:", error);
    alert("Kon niet goedkeuren: " + (error.code || error.message));
  }
};

window.deleteMemory = async function(id, storagePath) {
  if (!isAdmin()) return alert("Admin login nodig.");

  if (!confirm(currentLang === "nl" ? "Deze herinnering verwijderen?" : "¿Eliminar este recuerdo?")) return;

  try {
    await deleteDoc(doc(db, "memories", id));

    if (storagePath) {
      try {
        await deleteObject(ref(storage, storagePath));
      } catch (storageError) {
        console.warn("Foto kon niet verwijderd worden:", storageError);
      }
    }

    await loadMemories();
  } catch (error) {
    console.error("Delete error:", error);
    alert("Kon niet verwijderen: " + (error.code || error.message));
  }
};

window.clearAllMemories = async function() {
  if (!isAdmin()) return alert("Admin login nodig.");

  if (!confirm("Alle herinneringen verwijderen? Dit kan niet ongedaan gemaakt worden.")) return;

  try {
    const snap = await getDocs(collection(db, "memories"));

    for (const documentSnapshot of snap.docs) {
      const data = documentSnapshot.data();

      await deleteDoc(doc(db, "memories", documentSnapshot.id));

      if (data.storagePath) {
        try {
          await deleteObject(ref(storage, data.storagePath));
        } catch (storageError) {
          console.warn("Foto kon niet verwijderd worden:", storageError);
        }
      }
    }

    await loadMemories();
  } catch (error) {
    console.error("Clear all error:", error);
    alert("Kon niet alles verwijderen: " + (error.code || error.message));
  }
};

window.downloadPhoto = function(url, index) {
  if (!isAdmin()) return alert("Admin login nodig.");

  const link = document.createElement("a");
  link.href = url;
  link.download = `foto-herinnering-papi-${index + 1}.jpg`;
  link.target = "_blank";
  link.click();
};

window.downloadAllData = async function() {
  if (!isAdmin()) return alert("Admin login nodig.");

  try {
    const items = await getMemoryItems();
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "papito-herinneringen-backup.json";
    link.click();

    URL.revokeObjectURL(link.href);
  } catch (error) {
    console.error("Backup error:", error);
    alert("Kon backup niet downloaden: " + (error.code || error.message));
  }
};

function setupMemoryForm() {
  const form = $("form");
  if (!form) return;

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const submitButton = form.querySelector("button[type='submit'], .submit");
    const oldText = submitButton ? submitButton.textContent : "";

    if (submitButton) {
      submitButton.disabled = true;
      submitButton.textContent = currentLang === "nl" ? "Bezig met verzenden..." : "Enviando...";
    }

    try {
      const photoObject = await uploadPhoto(form.photo?.files?.[0]);

      const memoryData = {
        name: form.name.value.trim(),
        relation: form.relation.value.trim(),
        language: form.language.value,
        text: form.text.value.trim(),
        photo: photoObject.url,
        storagePath: photoObject.path,
        approved: false,
        date: new Date().toLocaleDateString(currentLang === "nl" ? "nl-BE" : "es-ES"),
        createdAt: serverTimestamp()
      };

      await addDoc(collection(db, "memories"), memoryData);
      await sendEmailNotification(memoryData);

      form.reset();

      alert(currentLang === "nl"
        ? "Bedankt. Je herinnering verschijnt na goedkeuring."
        : "Gracias. Tu recuerdo aparecerá después de la aprobación.");

      await loadMemories();
    } catch (error) {
      console.error("Submit error:", error);
      alert((currentLang === "nl" ? "Er ging iets mis: " : "Algo salió mal: ") + (error.code || error.message));
    } finally {
      if (submitButton) {
        submitButton.disabled = false;
        submitButton.textContent = oldText;
      }
    }
  });
}

function setupLightbox() {
  galleryImages = [...document.querySelectorAll("[data-lightbox]")].map((image) => image.src);

  document.querySelectorAll("[data-lightbox]").forEach((image, index) => {
    image.addEventListener("click", () => {
      galleryIndex = index;
      const lightboxImage = $("lbImg");
      const lightbox = $("lightbox");

      if (lightboxImage && lightbox) {
        lightboxImage.src = galleryImages[galleryIndex];
        lightbox.classList.add("open");
      }
    });
  });
}

window.closeLb = function() {
  const lightbox = $("lightbox");
  if (lightbox) lightbox.classList.remove("open");
};

window.nextLb = function() {
  if (!galleryImages.length) return;

  galleryIndex = (galleryIndex + 1) % galleryImages.length;
  const lightboxImage = $("lbImg");

  if (lightboxImage) lightboxImage.src = galleryImages[galleryIndex];
};

window.prevLb = function() {
  if (!galleryImages.length) return;

  galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
  const lightboxImage = $("lbImg");

  if (lightboxImage) lightboxImage.src = galleryImages[galleryIndex];
};

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeLb();
  if (event.key === "ArrowRight") nextLb();
  if (event.key === "ArrowLeft") prevLb();
  if (event.ctrlKey && event.altKey && event.key.toLowerCase() === "p") enterAdmin();
});

onAuthStateChanged(auth, async () => {
  const panel = $("adminPanel");
  if (panel) panel.style.display = isAdmin() ? "block" : "none";

  await loadMemories();
});

setLang(currentLang);
setupLightbox();
setupMemoryForm();

if (new URLSearchParams(location.search).get("admin") === "1") {
  setTimeout(enterAdmin, 300);
}
</script>
