.wall{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.card{background:#fffdf8;border-radius:20px;padding:20px;border-left:5px solid var(--soft)}.card .meta{color:var(--muted);font-size:14px;margin:6px 0 12px}.card img{width:100%;max-height:280px;object-fit:cover;border-radius:14px;margin-top:12px}
.adminActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.adminActions button{border:0;border-radius:999px;padding:9px 13px;cursor:pointer;background:#343137;color:white;font-weight:700}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;padding:24px}.lightbox.open{display:flex}.lightbox img{max-width:92vw;max-height:86vh;box-shadow:0 20px 60px rgba(0,0,0,.5)}.lbClose,.lbPrev,.lbNext{position:fixed;border:0;background:rgba(255,255,255,.9);color:#111;border-radius:999px;cursor:pointer;font-weight:900}.lbClose{right:22px;top:22px;font-size:24px;width:46px;height:46px}.lbPrev,.lbNext{top:50%;transform:translateY(-50%);font-size:30px;width:52px;height:52px}.lbPrev{left:22px}.lbNext{right:22px}

<script>
let currentLang='nl'; const ADMIN_CODE='papi1948';
function setLang(lang){currentLang=lang;document.documentElement.lang=lang;document.getElementById('nl')?.classList.toggle('active',lang==='nl');document.getElementById('es')?.classList.toggle('active',lang==='es');document.querySelectorAll('[data-nl]').forEach(el=>el.textContent=el.dataset[lang]);localStorage.setItem('site_lang',lang)}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function getData(){return JSON.parse(localStorage.getItem('memories')||'[]')} function saveData(d){localStorage.setItem('memories',JSON.stringify(d))}
function isAdmin(){return sessionStorage.getItem('papi_admin')==='yes'}
function enterAdmin(){const code=prompt(currentLang==='nl'?'Admin code:':'Código admin:'); if(code===ADMIN_CODE){sessionStorage.setItem('papi_admin','yes');const p=document.getElementById('adminPanel'); if(p)p.style.display='block';render()} else if(code!==null){alert(currentLang==='nl'?'Verkeerde code.':'Código incorrecto.')}}
function exitAdmin(){sessionStorage.removeItem('papi_admin');const p=document.getElementById('adminPanel'); if(p)p.style.display='none';render()}
function deleteMemory(i){if(!isAdmin())return; if(confirm(currentLang==='nl'?'Deze herinnering verwijderen?':'¿Eliminar este recuerdo?')){const d=getData();d.splice(i,1);saveData(d);render()}}
function downloadPhoto(i){const m=getData()[i]; if(!m||!m.photo)return; const a=document.createElement('a'); a.href=m.photo; a.download='foto-herinnering-papi-'+(i+1)+'.jpg'; a.click()}
function downloadAllData(){const blob=new Blob([JSON.stringify(getData(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='herinneringen-papi-backup.json'; a.click(); URL.revokeObjectURL(a.href)}
function clearAllMemories(){if(!isAdmin())return; if(confirm(currentLang==='nl'?'Alles verwijderen? Dit kan niet ongedaan gemaakt worden.':'¿Eliminar todo? No se puede deshacer.')){saveData([]);render()}}
function render(){const wall=document.getElementById('wall'); if(!wall)return; const data=getData(); const starters=[{name:'Familie',relation:'Voor Papi',language:'Nederlands',text:'Deze plek is gemaakt zodat iedereen een mooie herinnering aan Papi kan achterlaten.',date:new Date().toLocaleDateString('nl-BE')},{name:'Familia',relation:'Para Papi',language:'Español',text:'Este lugar fue creado para que todos puedan dejar un hermoso recuerdo para Papi.',date:new Date().toLocaleDateString('es-ES')}]; wall.innerHTML=''; data.forEach((m,i)=>{const div=document.createElement('div');div.className='card';div.innerHTML='<strong>'+esc(m.name)+'</strong><div class="meta">'+esc(m.relation)+' · '+esc(m.language)+' · '+esc(m.date)+'</div><p>'+esc(m.text).replace(/\\n/g,'<br>')+'</p>'+(m.photo?'<img src="'+m.photo+'">':'')+(isAdmin()?'<div class="adminActions">'+(m.photo?'<button type="button" onclick="downloadPhoto('+i+')">Foto downloaden</button>':'')+'<button type="button" onclick="deleteMemory('+i+')">Verwijderen</button></div>':'');wall.appendChild(div)}); starters.forEach(m=>{const div=document.createElement('div');div.className='card';div.innerHTML='<strong>'+esc(m.name)+'</strong><div class="meta">'+esc(m.relation)+' · '+esc(m.language)+' · '+esc(m.date)+'</div><p>'+esc(m.text)+'</p>';wall.appendChild(div)})}
function fileToDataURL(file){return new Promise(res=>{if(!file)return res('');const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
const formEl=document.getElementById('form'); if(formEl){formEl.addEventListener('submit',async e=>{e.preventDefault();const f=e.target;const d=getData();d.unshift({name:f.name.value,relation:f.relation.value,language:f.language.value,text:f.text.value,photo:await fileToDataURL(f.photo.files[0]),date:new Date().toLocaleDateString(currentLang==='nl'?'nl-BE':'es-ES')});saveData(d);f.reset();render()})}
let lbImages=[], lbIndex=0;
function setupLightbox(){lbImages=[...document.querySelectorAll('[data-lightbox]')].map(img=>img.src); document.querySelectorAll('[data-lightbox]').forEach((img,i)=>img.addEventListener('click',()=>openLb(i)))}
function openLb(i){lbIndex=i;document.getElementById('lbImg').src=lbImages[lbIndex];document.getElementById('lightbox').classList.add('open')}
function closeLb(){document.getElementById('lightbox').classList.remove('open')}
function nextLb(){lbIndex=(lbIndex+1)%lbImages.length;document.getElementById('lbImg').src=lbImages[lbIndex]}
function prevLb(){lbIndex=(lbIndex-1+lbImages.length)%lbImages.length;document.getElementById('lbImg').src=lbImages[lbIndex]}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb(); if(e.key==='ArrowRight')nextLb(); if(e.key==='ArrowLeft')prevLb(); if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==='p')enterAdmin()});
setLang(localStorage.getItem('site_lang')||'nl'); render(); setupLightbox(); if(new URLSearchParams(location.search).get('admin')==='1') setTimeout(enterAdmin,300);
</script>
